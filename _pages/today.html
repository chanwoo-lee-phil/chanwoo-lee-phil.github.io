<div id="auth-container" style="
  position: fixed; top: 0; left: 0; width: 100%; height: 100%;
  background: rgba(255,255,255,0.98); display: flex; flex-direction: column;
  justify-content: center; align-items: center; z-index: 9999;
  font-family: sans-serif;
">
  <div style="text-align: center; max-width: 300px; width: 90%;">
    <h3 style="margin-bottom: 20px; color: #333;">Secret Code</h3>
    
    <input type="password" id="password-input" placeholder="Enter code" style="
      width: 100%; padding: 12px; margin-bottom: 12px;
      border: 1px solid #ccc; border-radius: 6px; box-sizing: border-box;
      font-size: 16px; text-align: center;
    " onkeydown="if(event.key === 'Enter') verify()">
    
    <button onclick="verify()" style="
      width: 100%; padding: 12px; background: #333; color: #fff;
      border: none; border-radius: 6px; font-size: 16px; cursor: pointer;
    ">Submit</button>
    
    <div id="status-msg" style="margin-top: 15px; color: #666; font-size: 14px;">인증 대기 중...</div>
  </div>
</div>

<script>
  // ==========================================
  // [유지보수 설정]
  // ==========================================
  const targetEncoded = "aHR0cHM6Ly9kb2NzLmdvb2dsZS5jb20vc3ByZWFkc2hlZXRzL2QvMU5jYzBSLXNfeEJLNGJkdzByYm5icWEyUGMyS3k3REpFMkV4MV9BeERQRzgvZWRpdD91c3A9c2hhcmluZw==";
  const secretHash = "6a5cba8b787b9b4d9cfb83528cc791826db2bf07cad846f6c56bd1df55fa0059";

  // ==========================================
  // [핵심 로직]
  // ==========================================
  
  // 페이지 로드 시 입력창에 자동으로 포커스 주기
  window.onload = function() {
    document.getElementById("password-input").focus();
  }

  // SHA-256 해시 생성 함수
  async function digestMessage(message) {
    const msgUint8 = new TextEncoder().encode(message);
    const hashBuffer = await crypto.subtle.digest('SHA-256', msgUint8);
    const hashArray = Array.from(new Uint8Array(hashBuffer));
    return hashArray.map(b => b.toString(16).padStart(2, '0')).join('');
  }

  // 인증 수행 함수
  async function verify() {
    const inputField = document.getElementById("password-input");
    const statusField = document.getElementById("status-msg");
    const input = inputField.value;
    
    if (!input) return;

    const inputHash = await digestMessage(input);

    if (inputHash === secretHash) {
      statusField.innerText = "인증 성공! 이동합니다.";
      statusField.style.color = "green";
      window.location.href = atob(targetEncoded);
    } else {
      alert("비밀번호가 틀렸습니다.");
      statusField.innerText = "접근 거부됨.";
      statusField.style.color = "red";
      inputField.value = ""; // 입력창 비우기
      window.location.href = "https://www.google.com"; // 실패 시 구글로 이동
    }
  }
</script>
